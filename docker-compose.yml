version: '3.8'

services:
  cryptobot-web:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - cryptobot-network

networks:
  cryptobot-network:
    driver: bridge
